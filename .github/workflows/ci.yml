name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['18', '20']
        package:
          - build-gate
          - breakout
          - connectors/ai-peer-mcp
          - merkle-dag
    name: ${{ matrix.package }} (node ${{ matrix.node-version }})
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Run tests
        working-directory: ${{ matrix.package }}
        run: npm test
