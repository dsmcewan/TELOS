name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel an in-progress run when a newer commit supersedes it. Grouping by
# github.ref isolates each PR (refs/pull/N/merge) and the main branch
# (refs/heads/main), so a push to one never cancels another's run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['18', '20']
        package:
          - build-gate
          - breakout
          - connectors/ai-peer-mcp
          - merkle-dag
          - saas-forge
          - ai-forge
          - forge
          - clotho
          - ai-native-memory
          - lachesis
          - atropos
    name: ${{ matrix.package }} (node ${{ matrix.node-version }})
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # clotho's deriveRepositoryRef (Task 2) rejects a shallow clone, so its
          # job needs full history; every other package keeps the default depth.
          fetch-depth: ${{ matrix.package == 'clotho' && '0' || '1' }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Check ai-native-memory scripts
        if: matrix.package == 'ai-native-memory'
        working-directory: ai-native-memory
        run: npm run check

      - name: Run tests
        working-directory: ${{ matrix.package }}
        run: npm test

  repository-portability:
    runs-on: ubuntu-latest
    name: repository paths are portable
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Reject paths that cannot be checked out on Windows
        run: node .github/scripts/check-portable-paths.mjs

  # The institutional-memory layer's own oracle: every NORMATIVE machine record
  # (contracts, invariants, authority chains, env surface) must equal what the
  # code and workflow artifacts actually are — re-derived from disk on every run.
  institutional-memory:
    runs-on: ubuntu-latest
    name: institutional-memory (records == reality)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Committed self-weave verification re-derives the repository root and
          # intentionally rejects shallow history.
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify contracts against code, workflows, and disk
        run: node docs/institutional-memory/verify-contracts.mjs

      - name: Verify committed Clotho self-weave against current bytes
        run: node docs/runs/clotho-self-weave/run.mjs --verify-committed

  narcissus-flagship:
    runs-on: ubuntu-latest
    name: narcissus flagship
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # The live graph and evidence ledger are derived from tracked history.
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: narcissus/flagship/package-lock.json

      - name: Install locked dependencies
        working-directory: narcissus/flagship
        run: npm ci

      - name: Audit production and development dependencies
        working-directory: narcissus/flagship
        run: npm audit --audit-level=moderate

      - name: Run verifier regression tests
        working-directory: narcissus/flagship
        run: npm test

      - name: Verify evidence pins and command coverage
        working-directory: narcissus/flagship
        run: |
          npm run verify:evidence
          npm run verify:coverage

      - name: Verify committed live graph is current
        working-directory: narcissus/flagship
        run: npm run check:live-graph

      - name: Build production bundle
        working-directory: narcissus/flagship
        run: npm run build

      - name: Install Playwright Chromium
        working-directory: narcissus/flagship
        run: npx playwright install --with-deps chromium

      - name: Run end-to-end tests
        working-directory: narcissus/flagship
        run: npm run test:e2e

      - name: Require a clean tracked checkout
        run: git diff --exit-code -- .

  required-ci:
    if: ${{ always() }}
    needs:
      - test
      - repository-portability
      - institutional-memory
      - narcissus-flagship
    runs-on: ubuntu-latest
    name: required CI
    steps:
      - name: Require every CI job group to succeed
        env:
          TEST_RESULT: ${{ needs.test.result }}
          PORTABILITY_RESULT: ${{ needs.repository-portability.result }}
          MEMORY_RESULT: ${{ needs.institutional-memory.result }}
          NARCISSUS_RESULT: ${{ needs.narcissus-flagship.result }}
        run: |
          test "$TEST_RESULT" = "success"
          test "$PORTABILITY_RESULT" = "success"
          test "$MEMORY_RESULT" = "success"
          test "$NARCISSUS_RESULT" = "success"
