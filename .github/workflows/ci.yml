name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel an in-progress run when a newer commit supersedes it. Grouping by
# github.ref isolates each PR (refs/pull/N/merge) and the main branch
# (refs/heads/main), so a push to one never cancels another's run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['18', '20']
        package:
          - build-gate
          - breakout
          - connectors/ai-peer-mcp
          - merkle-dag
          - saas-forge
    name: ${{ matrix.package }} (node ${{ matrix.node-version }})
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Run tests
        working-directory: ${{ matrix.package }}
        run: npm test
