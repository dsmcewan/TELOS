name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel an in-progress run when a newer commit supersedes it. Grouping by
# github.ref isolates each PR (refs/pull/N/merge) and the main branch
# (refs/heads/main), so a push to one never cancels another's run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['18', '20']
        package:
          - build-gate
          - breakout
          - connectors/ai-peer-mcp
          - merkle-dag
          - saas-forge
          - ai-forge
          - forge
          - clotho
    name: ${{ matrix.package }} (node ${{ matrix.node-version }})
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # clotho's deriveRepositoryRef (Task 2) rejects a shallow clone, so its
          # job needs full history; every other package keeps the default depth.
          fetch-depth: ${{ matrix.package == 'clotho' && '0' || '1' }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Run tests
        working-directory: ${{ matrix.package }}
        run: npm test

  # The institutional-memory layer's own oracle: every NORMATIVE machine record
  # (contracts, invariants, authority chains, env surface) must equal what the
  # code and workflow artifacts actually are — re-derived from disk on every run.
  institutional-memory:
    runs-on: ubuntu-latest
    name: institutional-memory (records == reality)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify contracts against code, workflows, and disk
        run: node docs/institutional-memory/verify-contracts.mjs
